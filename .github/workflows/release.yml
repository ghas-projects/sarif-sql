name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o sarif-sql-${{ matrix.goos }}-${{ matrix.goarch }}${ext}

      - name: Attest Build
        uses: actions/attest@v4
        with:
          subject-path: sarif-sql-${{ matrix.goos }}-${{ matrix.goarch }}*

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: sarif-sql-${{ matrix.goos }}-${{ matrix.goarch }}
          path: sarif-sql-*

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ github.ref_name }} sarif-sql-* --generate-notes

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          artifact-name: sbom-${{ github.ref_name }}.spdx.json
          output-file: sbom-${{ github.ref_name }}.spdx.json

      - name: Attest SBOM
        uses: actions/attest@v7
        with:
          subject-path: sarif-sql-*
          sbom-path: sbom-${{ github.ref_name }}.spdx.json
