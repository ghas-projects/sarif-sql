syntax = "proto3";

package sarif;

option csharp_namespace = "MRVA.Reports.Data.Models";
option go_package = "github.com/ghas-projects/sarif-protobuf/proto/sarifpb";

message Repository {
  int32 row_id = 1;
  string repository_full_name = 2;
  string repository_url = 3;
  string analysis_status = 4;
  optional int32  result_count = 5;
  optional int32 artifact_size_in_bytes = 6;
  string analysis_id = 7;
}

message Analysis {
  int32 row_id = 1;
  string tool_name = 2;
  optional string tool_version = 3;
  string analysis_id = 4;
  optional string controller_repo = 5;
  optional string date = 6;
  string state = 7;
  string query_language = 8;
  string created_at = 9;
  optional string completed_at = 10;
  string status = 11;
  optional string failure_reason = 12;
  int32 scanned_repos_count = 13; 
  int32 skipped_repos_count = 14;
  int32 not_found_repos_count = 15;
  int32 no_codeql_db_repos_count = 16;
  int32 over_limit_repos_count = 17; 
  int32 actions_workflow_run_id = 18;
  int32 total_repos_count = 19;
}

message Rule {
  int32 row_id = 1;
  string id = 2;
  string rule_name = 3;
  optional string rule_description = 4;
  repeated string property_tags = 5;
  string kind = 6;
  optional string severity_level = 7;
}

message Alert {
  int32 row_id = 1;
  string file_path = 2;
  optional int32 start_line = 3;
  optional int32 start_column = 4;
  optional int32 end_line = 5;
  optional int32 end_column = 6;
  optional string code_snippet_source = 7;
  optional string code_snippet_sink = 8;
  optional string code_snippet = 9;
  optional string code_snippet_context = 10;
  string message = 11;
  optional string result_fingerprint = 12;
  optional int32 step_count = 13;
  int32 repository_row_id = 14;
  int32 analysis_row_id = 15;
  int32 rule_row_id = 16;
}

// Wrapper messages for serializing collections
message RepositoryList {
  repeated Repository repositories = 1;
}

message AnalysisList {
  repeated Analysis analyses = 1;
}

message RuleList {
  repeated Rule rules = 1;
}

message AlertList {
  repeated Alert alerts = 1;
}
